<title>Lacak Lokasi - Dengan Izin</title>

  body { font-family: Arial; text-align:center; padding:50px; background:#f0f0f0; }

</style>

<body>

<div class="card" id="form">
  <h2>📍 Bagikan Lokasi Kamu</h2>

  <button onclick="getLocation()">Izinkan & Kirim Lokasi</button>
  <p id="status"></p>
</div>

<div class="card" id="admin" style="display:none;">
  <h2>Dashboard Admin</h2>
  <div id="map"></div>
  <p id="coords"></p>
</div>

let lat, lon;

function getLocation() {
  document.getElementById("status").innerText = "Meminta izin lokasi...";
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(showPosition, showError);
  } else { 
    document.getElementById("status").innerText = "Browser tidak support GPS";
  }
}

  lat = position.coords.latitude;
